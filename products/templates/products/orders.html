{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <style>
        .order-card {
            border-left: 4px solid #007bff;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .order-card:hover {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .order-card.pending {
            border-left-color: #ffc107;
        }
        .order-card.paid {
            border-left-color: #17a2b8;
        }
        .order-card.completed {
            border-left-color: #28a745;
        }
        .order-card.cancelled {
            border-left-color: #dc3545;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }
        .order-details {
            display: none;
        }
        .order-details.show {
            display: block;
        }
        .order-items {
            margin-top: 10px;
        }
        .order-item {
            border-bottom: 1px dashed #ddd;
            padding: 8px 0;
        }
        .order-item:last-child {
            border-bottom: none;
        }
        .action-buttons {
            margin-top: 10px;
        }
        .filter-section {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .pagination-container {
            margin-top: 20px;
        }
        .order-timeline {
            position: relative;
            padding-left: 30px;
            margin-top: 15px;
        }
        .order-timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ddd;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 15px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 3px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #007bff;
        }
        .timeline-item.completed::before {
            background: #28a745;
        }
        .timeline-item.active::before {
            background: #ffc107;
            box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.2);
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12 mb-3">
                <h1>订单管理</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/">首页</a></li>
                        <li class="breadcrumb-item active" aria-current="page">订单管理</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="row">
            <div class="col-12 mb-4">
                <div class="filter-section">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="order-status-filter" class="form-label">订单状态</label>
                            <select class="form-select" id="order-status-filter">
                                <option value="">全部状态</option>
                                <option value="pending">待处理</option>
                                <option value="paid">已支付</option>
                                <option value="completed">已完成</option>
                                <option value="cancelled">已取消</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="date-range-filter" class="form-label">日期范围</label>
                            <select class="form-select" id="date-range-filter">
                                <option value="all">全部时间</option>
                                <option value="today">今天</option>
                                <option value="week">本周</option>
                                <option value="month">本月</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button id="apply-filters-btn" class="btn btn-primary me-2">应用筛选</button>
                            <button id="reset-filters-btn" class="btn btn-outline-secondary">重置</button>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <a href="/products/recognition/" class="btn btn-success w-100">返回识别</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div id="orders-container" class="mb-4">
                    <!-- 订单列表将在这里动态加载 -->
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-3">正在加载订单数据...</p>
                    </div>
                </div>

                <div id="pagination-container" class="pagination-container d-flex justify-content-center">
                    <!-- 分页控件将在这里动态加载 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 订单详情模态框 -->
    <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-labelledby="orderDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="orderDetailModalLabel">订单详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="order-detail-content">
                        <!-- 订单详情内容将在这里动态加载 -->
                        <div class="text-center py-3">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" id="print-order-btn" class="btn btn-outline-primary">打印订单</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 支付模态框 -->
    <div class="modal fade" id="paymentModal" tabindex="-1" aria-labelledby="paymentModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="paymentModalLabel">订单支付</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="payment-content">
                        <!-- 支付内容将在这里动态加载 -->
                        <div class="text-center py-3">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" id="confirm-payment-btn" class="btn btn-primary">确认支付</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/orders.js' %}"></script>
</body>
</html>
