{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品识别系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <style>
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
        }
        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .detection-box {
            position: absolute;
            border: 2px solid #ff0000;
            background-color: rgba(255, 0, 0, 0.1);
        }
        .detection-label {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 2px 6px;
            font-size: 12px;
            border-radius: 3px;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .status-indicator.running {
            background-color: #28a745;
        }
        .status-indicator.stopped {
            background-color: #dc3545;
        }
        .results-panel {
            max-height: 400px;
            overflow-y: auto;
        }
        .spinner-border-lg {
            width: 3rem;
            height: 3rem;
            border-width: 0.3em;
        }
        .image-preview {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .auto-flow-controls {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12 mb-3">
                <h1>商品识别系统</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/">首页</a></li>
                        <li class="breadcrumb-item active" aria-current="page">商品识别</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="row">
            <!-- 摄像头和识别结果面板 -->
            <div class="col-lg-8 mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5>实时识别</h5>
                    </div>
                    <div class="card-body">
                        <div class="camera-container mb-3">
                            <img id="camera-feed" src="{% static 'images/no-camera.jpg' %}" alt="摄像头画面" class="img-fluid rounded">
                            <div id="detection-overlay" class="camera-overlay"></div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <span id="camera-status" class="status-indicator stopped"></span>
                                <span id="camera-status-text">摄像头未启动</span>
                            </div>
                            <div class="btn-group">
                                <button id="start-camera-btn" class="btn btn-success">启动摄像头</button>
                                <button id="stop-camera-btn" class="btn btn-danger" disabled>停止摄像头</button>
                            </div>
                        </div>
                        
                        <!-- 自动识别流程控制面板 -->
                        <div class="auto-flow-controls mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-0">自动识别流程</h6>
                                    <small class="text-muted">自动识别、创建订单并更新库存</small>
                                </div>
                                <div>
                                    <span id="auto-flow-status" class="status-indicator stopped"></span>
                                    <span id="auto-flow-status-text">自动流程未启动</span>
                                </div>
                            </div>
                            <div class="btn-group mt-2">
                                <button id="start-auto-flow-btn" class="btn btn-primary">启动自动流程</button>
                                <button id="stop-auto-flow-btn" class="btn btn-warning" disabled>停止自动流程</button>
                            </div>
                        </div>
                        
                        <!-- 识别结果展示 -->
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">识别结果</h6>
                            </div>
                            <div class="card-body results-panel">
                                <div id="recognition-results" class="mb-3">
                                    <p class="text-muted text-center">等待识别结果...</p>
                                </div>
                                
                                <div class="text-center">
                                    <div id="recognition-spinner" class="spinner-border text-primary spinner-border-lg d-none" role="status">
                                        <span class="visually-hidden">识别中...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 侧边栏控制面板 -->
            <div class="col-lg-4 mb-4">
                <!-- 识别设置 -->
                <div class="card mb-4">
                    <div class="card-header bg-secondary text-white">
                        <h6 class="mb-0">识别设置</h6>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="confidence-threshold" class="form-label">置信度阈值</label>
                            <input type="range" class="form-range" id="confidence-threshold" min="0.1" max="1" step="0.05" value="0.5">
                            <div class="d-flex justify-content-between">
                                <small>0.1</small>
                                <small id="confidence-threshold-value">0.5</small>
                                <small>1.0</small>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="auto-order-delay" class="form-label">自动订单延迟 (秒)</label>
                            <input type="number" class="form-control" id="auto-order-delay" min="1" max="30" value="5">
                        </div>
                        
                        <div class="mb-3">
                            <label for="max-items-per-order" class="form-label">最大订单项目数</label>
                            <input type="number" class="form-control" id="max-items-per-order" min="1" max="10" value="5">
                        </div>
                        
                        <button id="save-settings-btn" class="btn btn-primary btn-block w-100">保存设置</button>
                    </div>
                </div>
                
                <!-- 快速操作 -->
                <div class="card mb-4">
                    <div class="card-header bg-secondary text-white">
                        <h6 class="mb-0">快速操作</h6>
                    </div>
                    <div class="card-body">
                        <button id="manual-recognition-btn" class="btn btn-outline-primary w-100 mb-2">手动识别</button>
                        <button id="clear-results-btn" class="btn btn-outline-secondary w-100 mb-2">清除结果</button>
                        <a href="/products/orders/" class="btn btn-outline-success w-100 mb-2">查看订单</a>
                        <a href="/products/inventory/" class="btn btn-outline-info w-100">库存管理</a>
                    </div>
                </div>
                
                <!-- 性能监控 -->
                <div class="card">
                    <div class="card-header bg-secondary text-white">
                        <h6 class="mb-0">性能监控</h6>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                总识别次数
                                <span id="total-recognitions" class="badge bg-primary rounded-pill">0</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                平均置信度
                                <span id="avg-confidence" class="badge bg-primary rounded-pill">0%</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                平均处理时间
                                <span id="avg-processing-time" class="badge bg-primary rounded-pill">0ms</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/recognition.js' %}"></script>
</body>
</html>
